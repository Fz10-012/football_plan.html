<!DOCTYPE html>
<html>
<head>
  <title>Orpheas Pro Dashboard</title>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    h1 { color:#00ffcc; }
    .box { background:#222; padding:15px; margin:10px 0; border-radius:10px; }
    label { display:block; margin:5px 0; }
  </style>
</head>

<body>

<h1>⚽ Orpheas Pro Football System</h1>

<div class="box">
<h2>🧠 Daily XP Checklist</h2>

<label><input type="checkbox"> Breathing (+5 XP)</label>
<label><input type="checkbox"> Visualization (+5 XP)</label>
<label><input type="checkbox"> Study done (+10 XP)</label>
<label><input type="checkbox"> Training done (+20 XP)</label>
<label><input type="checkbox"> Extra technical work (+10 XP)</label>
<label><input type="checkbox"> Stretching (+5 XP)</label>
<label><input type="checkbox"> Sleep on time (+10 XP)</label>
</div>

<div class="box">
<h2>⚽ Match Review</h2>
<label><input type="checkbox"> Scanning</label>
<label><input type="checkbox"> 1v1 attempts</label>
<label><input type="checkbox"> Decision making</label>
<label><input type="checkbox"> Impact on game</label>
</div>

<div class="box">
<h2>🧠 Scout Questions</h2>
<ul>
<li>Did I influence the game?</li>
<li>Did I break lines?</li>
<li>Did I create danger?</li>
</ul>
</div>

</body>
</html>
